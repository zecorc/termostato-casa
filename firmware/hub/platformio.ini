; ESP32 hub — display SPI + relay + web UI (HW-394 + GMT028-05)
[platformio]
default_envs = esp32dev

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps = bodmer/TFT_eSPI
build_flags =
  -I ../common/include
  -I include
  -DUSER_SETUP_LOADED=1
  -include include/board_config.h

[env:esp32dev]
board = esp32dev
