; Termostato casa — monorepo root
; Per-target builds use the project directories below:
;   pio run -d firmware/hub
;   pio run -d firmware/sensor
[platformio]
src_dir = .
default_envs = hub, sensor

[env:hub]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = bodmer/TFT_eSPI
build_flags =
  -I firmware/common/include
  -I firmware/hub/include
  -DUSER_SETUP_LOADED=1
  -include firmware/hub/include/board_config.h
build_src_filter = +<firmware/hub/src/> -<*> +<firmware/hub/src/**>

[env:sensor]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = -I firmware/common/include
build_src_filter = +<firmware/sensor/src/> -<*> +<firmware/sensor/src/**>
